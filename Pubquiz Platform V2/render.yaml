services:
  - type: web
    name: pubquiz-platform
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000
    persistedDisk:
      name: pubquiz-data
      mountPath: /app/data
      sizeGB: 1